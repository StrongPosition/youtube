name: 🎯 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Mode: single | search'
        required: true
        type: choice
        options:
          - single
          - search
        default: 'single'
      url:
        description: '🎬 YouTube URL or search query'
        required: true
        type: string
      type:
        description: '📦 Output type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720 | audio: 128/320)'
        required: false
        type: string
        default: '720'
      max_videos:
        description: '🔢 Max search results'
        required: false
        type: number
        default: 10
      split_threshold_mb:
        description: '📦 Split threshold MB (0 = no split)'
        required: false
        type: number
        default: 100
      request_id:
        description: '🔑 Unique request ID (UUID) for file isolation'
        required: true
        type: string

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  process:
    name: 🚀 Download & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # No `contents: write` needed — we never push to git

    steps:
      # ── 1. Dependencies ────────────────────────────────────────────────────
      - name: ⚡ Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp ffmpeg zip
          pip install -q yt-dlp

      # ── 2. Single video download ────────────────────────────────────────────
      - name: 📥 Download video/audio
        if: ${{ github.event.inputs.mode == 'single' }}
        env:
          VIDEO_URL:  ${{ github.event.inputs.url }}
          TYPE:       ${{ github.event.inputs.type }}
          QUALITY:    ${{ github.event.inputs.quality }}
          SPLIT_MB:   ${{ github.event.inputs.split_threshold_mb }}
          REQUEST_ID: ${{ github.event.inputs.request_id }}
        run: |
          set -euo pipefail
          mkdir -p "downloads/$REQUEST_ID"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📥 DOWNLOADING  mode=$TYPE  quality=${QUALITY}p"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$TYPE" = "audio" ]; then
            yt-dlp \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality "${QUALITY}k" \
              --no-playlist \
              --no-warnings \
              -o "downloads/$REQUEST_ID/%(title).60s.%(ext)s" \
              "$VIDEO_URL"
          else
            case "$QUALITY" in
              144)  FMT="bestvideo[height<=144][ext=mp4]+bestaudio[ext=m4a]/best[height<=144]" ;;
              360)  FMT="bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]" ;;
              480)  FMT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]" ;;
              720)  FMT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" ;;
              1080) FMT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]" ;;
              *)    FMT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" ;;
            esac

            yt-dlp \
              -f "$FMT" \
              --merge-output-format mp4 \
              --no-playlist \
              --no-warnings \
              -o "downloads/$REQUEST_ID/%(title).60s.%(ext)s" \
              "$VIDEO_URL"
          fi

          echo ""
          echo "📂 Downloaded files:"
          ls -lh "downloads/$REQUEST_ID/"

          # ── Split large files ─────────────────────────────────────────────
          if [ "$SPLIT_MB" != "0" ] && [ "$SPLIT_MB" -gt 0 ]; then
            echo ""
            echo "✂️  Checking split threshold (${SPLIT_MB} MB)..."
            for filepath in "downloads/$REQUEST_ID"/*; do
              [ -f "$filepath" ] || continue
              SIZE_BYTES=$(stat -c%s "$filepath")
              THRESHOLD=$(( SPLIT_MB * 1024 * 1024 ))
              if [ "$SIZE_BYTES" -gt "$THRESHOLD" ]; then
                BASENAME=$(basename "$filepath")
                DIRPATH=$(dirname "$filepath")
                echo "   ✂️  Splitting $BASENAME ($(( SIZE_BYTES / 1024 / 1024 )) MB)..."
                (cd "$DIRPATH" && zip -q -s "${SPLIT_MB}m" "${BASENAME}.zip" "$BASENAME" && rm "$BASENAME")
                echo "   ✅ Split complete:"
                ls -lh "$DIRPATH/"
              fi
            done
          fi

      # ── 3. Search ───────────────────────────────────────────────────────────
      - name: 🔍 Search videos
        if: ${{ github.event.inputs.mode == 'search' }}
        env:
          QUERY:      ${{ github.event.inputs.url }}
          MAX:        ${{ github.event.inputs.max_videos }}
          REQUEST_ID: ${{ github.event.inputs.request_id }}
        run: |
          set -euo pipefail
          mkdir -p searches

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 SEARCHING: $QUERY  (max $MAX)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          python3 << 'PYEOF'
          import subprocess, json, os, sys

          query      = os.environ['QUERY']
          max_videos = int(os.environ.get('MAX', '10'))
          request_id = os.environ['REQUEST_ID']

          result = subprocess.run(
              ['yt-dlp', '--dump-json', '--no-playlist', '--flat-playlist',
               '--no-warnings', f'ytsearch{max_videos}:{query}'],
              capture_output=True, text=True, timeout=60
          )

          if result.returncode != 0:
              print(f'yt-dlp error: {result.stderr}', file=sys.stderr)
              sys.exit(1)

          videos = []
          for line in result.stdout.strip().split('\n'):
              line = line.strip()
              if not line:
                  continue
              try:
                  data = json.loads(line)
                  duration_sec = int(data.get('duration') or 0)
                  videos.append({
                      'title':    data.get('title', ''),
                      'channel':  data.get('uploader') or data.get('channel') or '',
                      'duration': duration_sec // 60,
                      'url':      f"https://www.youtube.com/watch?v={data.get('id', '')}",
                      'views':    str(data.get('view_count') or 0),
                      'id':       data.get('id', ''),
                  })
              except Exception as e:
                  print(f'Parse error: {e}', file=sys.stderr)

          out_path = f'searches/{request_id}.json'
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(videos, f, ensure_ascii=False, indent=2)

          print(f'✅ Found {len(videos)} results → {out_path}')
          PYEOF

      # ── 4. Upload to FTP ────────────────────────────────────────────────────
      - name: 📤 Upload to FTP
        env:
          FTP_HOST:     ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          MODE:         ${{ github.event.inputs.mode }}
          REQUEST_ID:   ${{ github.event.inputs.request_id }}
        run: |
          set -euo pipefail

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 UPLOADING TO FTP  mode=$MODE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$MODE" = "single" ]; then
            FILE_COUNT=$(ls "downloads/$REQUEST_ID/" | wc -l)
            echo "   Files to upload: $FILE_COUNT"

            # lftp reads password from env — no plaintext in shell history
            lftp -c "
              set ftp:passive-mode yes
              set net:timeout 30
              set net:max-retries 3
              open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST
              mkdir -p /downloads/$REQUEST_ID
              mput -O /downloads/$REQUEST_ID downloads/$REQUEST_ID/*
              quit
            "
            echo "✅ Upload complete → /downloads/$REQUEST_ID/"

          else
            echo "   Uploading search results..."
            lftp -c "
              set ftp:passive-mode yes
              set net:timeout 30
              set net:max-retries 3
              open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" ftp://$FTP_HOST
              mkdir -p /searches
              put searches/$REQUEST_ID.json -o /searches/$REQUEST_ID.json
              quit
            "
            echo "✅ Upload complete → /searches/$REQUEST_ID.json"
          fi
